# ALFWorld Clean Configuration
defaults:
  - ../base

benchmark: alfworld

alfworld:
  split: eval_out_of_distribution   # OOD test split (134 tasks)
  max_instances: null
  task_types: null                   # null = all 6 task types

data:
  num_teacher_trajectories: 134     # ALFWorld eval-OOD size
  max_episode_steps: 30

perturbations:
  tool_flakiness:
    enabled: false
  partial_observability:
    enabled: false
  prompt_injection:
    enabled: false
  distractors:
    enabled: false

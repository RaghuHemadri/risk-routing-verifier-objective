# ALFWorld Noisy Configuration
defaults:
  - ../base

benchmark: alfworld

alfworld:
  split: eval_out_of_distribution
  max_instances: null
  task_types: null

data:
  num_teacher_trajectories: 134
  num_perturbation_seeds: 20
  max_episode_steps: 30

# Perturbations are scoped to HumanEval and GAIA only.
perturbations:
  tool_flakiness:
    enabled: false
  partial_observability:
    enabled: false
  prompt_injection:
    enabled: false
  distractors:
    enabled: false

# GAIA Clean Configuration
defaults:
  - ../base

benchmark: gaia

gaia:
  dataset:
    name: gaia-benchmark/GAIA
    split: validation        # 165 questions with answers
    levels: null             # null = all levels (1, 2, 3)
    max_instances: null

  cmd_timeout: 30            # per tool execution

data:
  num_teacher_trajectories: 165   # GAIA validation set size
  max_episode_steps: 15

perturbations:
  tool_flakiness:
    enabled: false
  partial_observability:
    enabled: false
  prompt_injection:
    enabled: false
  distractors:
    enabled: false

# GAIA Noisy Configuration
defaults:
  - ../base

benchmark: gaia

gaia:
  dataset:
    name: gaia-benchmark/GAIA
    split: validation        # 165 questions with answers
    levels: null             # null = all levels (1, 2, 3)
    max_instances: null

  cmd_timeout: 30

data:
  num_teacher_trajectories: 165
  num_perturbation_seeds: 20
  max_episode_steps: 15

# GAIA perturbations: shared + benchmark-specific
perturbations:
  common:
    tool_flakiness:
      enabled: true
      failure_prob: 0.10
      timeout_prob: 0.05
      stale_cache_prob: 0.12
      format_corruption_prob: 0.10
      numeric_drift_prob: 0.10
      pagination_cutoff_prob: 0.08

    partial_observability:
      enabled: true
      log_truncation_prob: 0.18
      log_line_drop_prob: 0.12

    prompt_injection:
      enabled: true
      direct_injection_prob: 0.12
      indirect_injection_prob: 0.10

    distractors:
      enabled: true
      semantic_distractor_prob: 0.18
      red_herring_prob: 0.14
      decoy_element_prob: 0.0

  benchmark_specific:
    gaia:
      tool_flakiness:
        failure_prob: 0.15    # retrieval tool and browser-call instability
        timeout_prob: 0.08
        result_shuffle_prob: 0.28
        format_corruption_prob: 0.16
        numeric_drift_prob: 0.14
        pagination_cutoff_prob: 0.12

      partial_observability:
        evidence_drop_prob: 0.22  # missing source/citation lines
        log_truncation_prob: 0.22

      prompt_injection:
        direct_injection_prob: 0.16
        indirect_injection_prob: 0.14
        exfiltration_attempt_prob: 0.08

      distractors:
        semantic_distractor_prob: 0.24
        red_herring_prob: 0.20
        plausible_wrong_prob: 0.12
        decoy_element_prob: 0.0

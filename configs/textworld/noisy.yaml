# TextWorld Noisy Configuration
defaults:
  - ../base

benchmark: textworld

textworld:
  mock: true
  dataset:
    path: data/textworld/tasks.jsonl
    max_instances: 100

data:
  num_teacher_trajectories: 100
  num_perturbation_seeds: 20
  max_episode_steps: 20

# TextWorld perturbations are tuned for short command-feedback loops where
# ambiguity in action outcomes and missing state cues dominate failure modes.
perturbations:
  common:
    tool_flakiness:
      enabled: true
      failure_prob: 0.08
      timeout_prob: 0.05
      stale_cache_prob: 0.10
      partial_response_prob: 0.14
      format_corruption_prob: 0.03
      numeric_drift_prob: 0.02
      pagination_cutoff_prob: 0.00

    partial_observability:
      enabled: true
      log_truncation_prob: 0.18
      log_line_drop_prob: 0.14
      info_mask_prob: 0.06

    prompt_injection:
      enabled: true
      direct_injection_prob: 0.10
      indirect_injection_prob: 0.08
      goal_hijack_prob: 0.06
      exfiltration_attempt_prob: 0.02
      role_confusion_prob: 0.03
      encoded_injection_prob: 0.02

    distractors:
      enabled: true
      semantic_distractor_prob: 0.16
      red_herring_prob: 0.14
      decoy_element_prob: 0.18
      plausible_wrong_prob: 0.12

  benchmark_specific:
    textworld:
      tool_flakiness:
        textworld_feedback_corruption_prob: 0.22
        stale_cache_prob: 0.14
        partial_response_prob: 0.18

      partial_observability:
        textworld_goal_redaction_prob: 0.12
        textworld_action_mask_prob: 0.18
        textworld_exit_hide_prob: 0.20
        textworld_object_hide_prob: 0.18
        log_truncation_prob: 0.22
        log_line_drop_prob: 0.18

      prompt_injection:
        direct_injection_prob: 0.12
        indirect_injection_prob: 0.10
        goal_hijack_prob: 0.08

      distractors:
        semantic_distractor_prob: 0.20
        red_herring_prob: 0.18
        plausible_wrong_prob: 0.16

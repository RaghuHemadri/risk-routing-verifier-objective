# RTL-Repair Noisy Configuration
defaults:
  - ../base

benchmark: rtlrepair

rtlrepair:
  dataset:
    path: data/rtlrepair/tasks.jsonl
    max_instances: null

  prefill_with_buggy: true
  cmd_timeout: 60
  test_timeout: 120

data:
  num_teacher_trajectories: 1
  num_perturbation_seeds: 20
  max_episode_steps: 12

# RTL-Repair noise profile emphasizes flaky simulation/tooling output and
# misleading patch suggestions in compact compile+test loops.
perturbations:
  common:
    tool_flakiness:
      enabled: true
      failure_prob: 0.12
      timeout_prob: 0.08
      stale_cache_prob: 0.06
      partial_response_prob: 0.12
      format_corruption_prob: 0.06
      numeric_drift_prob: 0.03

    partial_observability:
      enabled: true
      log_truncation_prob: 0.20
      log_line_drop_prob: 0.14
      info_mask_prob: 0.08

    prompt_injection:
      enabled: true
      direct_injection_prob: 0.12
      indirect_injection_prob: 0.10
      goal_hijack_prob: 0.06
      exfiltration_attempt_prob: 0.02
      role_confusion_prob: 0.03
      encoded_injection_prob: 0.02

    distractors:
      enabled: true
      semantic_distractor_prob: 0.18
      red_herring_prob: 0.16
      decoy_element_prob: 0.0
      plausible_wrong_prob: 0.16

  benchmark_specific:
    rtlrepair:
      tool_flakiness:
        failure_prob: 0.14
        timeout_prob: 0.10

      partial_observability:
        log_truncation_prob: 0.24
        log_line_drop_prob: 0.18

      prompt_injection:
        direct_injection_prob: 0.14
        indirect_injection_prob: 0.12
        goal_hijack_prob: 0.08

      distractors:
        plausible_wrong_prob: 0.20
        red_herring_prob: 0.18
